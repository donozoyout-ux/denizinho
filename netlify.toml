[build]
  command = "npm install && npm run build"

[build.environment]
  NODE_VERSION = "22"
  NPM_FLAGS = "--legacy-peer-deps"
  NEXT_PUBLIC_APP_NAME = "EkipPlan"
  NEXT_PUBLIC_APP_TAGLINE = "Görevleri, ekipleri ve süreçleri tek yerde yönetin"

[[plugins]]
  package = "@netlify/plugin-nextjs"

[functions]
  directory = "netlify/functions"

[functions."scheduled-email-sync"]
  schedule = "*/15 * * * *"
