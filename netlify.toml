[build]
  command = "npm run build"


[build.environment]
  NODE_VERSION = "22"
  NPM_FLAGS = "--legacy-peer-deps"
  NEXT_PUBLIC_APP_NAME = "AidFlow"
  NEXT_PUBLIC_APP_TAGLINE = "Global Response"
  NEXT_PUBLIC_APP_URL = "https://gordagit.netlify.app"
  NEXT_PUBLIC_SITE_URL = "https://gordagit.netlify.app"

[[plugins]]
  package = "@netlify/plugin-nextjs"

[functions]
  directory = "netlify/functions"

[functions."scheduled-email-sync"]
  schedule = "*/15 * * * *"
